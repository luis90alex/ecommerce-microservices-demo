spring:
  application:
    name: microservice-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
          routes:
            - id: students
              uri: lb://microservice-student
              predicates:
                - Path=/student/**
            - id: courses
              uri: lb://microservice-course
              predicates:
                - Path=/course/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: false
    fetch-registry: true
