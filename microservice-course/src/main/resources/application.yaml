server:
  port: 9090
spring:
  application:
    name: microservice-course
  datasource:
    url: jdbc:mysql://localhost:3306/courseDb
    username: ${MYSQL_USER}
    password: ${MYSQL_USER}
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    database: mysql
    defer-datasource-initialization: true
  config:
    import: optional:configserver:http://localhost:8088 # Search the config in Config server. Optional

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka